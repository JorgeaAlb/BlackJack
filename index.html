<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Premium | Royal Casino Experience</title>
    <meta name="description"
        content="Vive la experiencia definitiva de Blackjack con nuestra versión Premium. Gráficos de alta calidad y jugabilidad fluida.">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <h1>BLACKJACK</h1>
                <span>Royal Casino Edition</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card" id="balance-card">
                    <span class="stat-label">Saldo</span>
                    <span class="stat-value">$<span id="balance">1000</span></span>
                </div>
                <div class="stat-card" id="bet-card" title="Click para reiniciar apuesta" style="cursor: pointer;">
                    <span class="stat-label">Apuesta</span>
                    <span class="stat-value">$<span id="bet">0</span></span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Victorias</span>
                    <span class="stat-value" id="wins">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Derrotas</span>
                    <span class="stat-value" id="losses">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Empates</span>
                    <span class="stat-value" id="pushes">0</span>
                </div>
            </div>
        </header>

        <!-- Game Table -->
        <main class="game-table">
            <!-- Dealer Section -->
            <section class="hand-section">
                <div class="hand-label">Banca <span class="score-badge" id="dealer-score">0</span></div>
                <div id="dealer-cards" class="cards-wrapper">
                    <!-- Cards will be injected here -->
                </div>
            </section>

            <!-- Status Message -->
            <div class="game-status">
                <div id="status-message" class="status-message">Haz tu apuesta para empezar</div>
            </div>

            <!-- Player Section -->
            <section class="hand-section">
                <div id="player-cards" class="cards-wrapper">
                    <!-- Cards will be injected here -->
                </div>
                <div class="hand-label">Jugador <span class="score-badge" id="player-score">0</span></div>
            </section>
        </main>

        <!-- Controls Panel -->
        <section class="controls-panel">
            <div class="betting-section">
                <div class="chip chip-10" data-amount="10" title="Apostar $10">10</div>
                <div class="chip chip-25" data-amount="25" title="Apostar $25">25</div>
                <div class="chip chip-50" data-amount="50" title="Apostar $50">50</div>
                <div class="chip chip-100" data-amount="100" title="Apostar $100">100</div>
                <div class="chip chip-500" data-amount="500" title="Apostar $500">500</div>
            </div>

            <div class="action-buttons">
                <button id="hit-btn" class="btn btn-primary" disabled>
                    <i class="fas fa-plus"></i> Pedir
                </button>
                <button id="stand-btn" class="btn btn-primary" disabled>
                    <i class="fas fa-hand-paper"></i> Plantarse
                </button>
                <button id="double-btn" class="btn btn-outline" disabled>
                    <i class="fas fa-angle-double-up"></i> Doblar
                </button>
                <button id="repeat-btn" class="btn btn-outline" disabled>
                    <i class="fas fa-redo"></i> Repetir
                </button>
                <button id="new-game-btn" class="btn btn-primary" disabled>
                    <i class="fas fa-play"></i> Jugar
                </button>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2025 Royal Blackjack Casino Experience. Desarrollado por <a href="https://www.instagram.com/jorge_shh/" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 700;">Jorge Alberto</a>.</p>
        </footer>
    </div>

    <!-- Audio Assets -->
    <audio id="cardSound" src="https://assets.mixkit.co/sfx/preview/mixkit-playing-card-put-down-2564.mp3"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
    <audio id="loseSound" src="https://assets.mixkit.co/sfx/preview/mixkit-sad-game-over-1943.mp3"></audio>
    <audio id="chipsSound" src="https://assets.mixkit.co/sfx/preview/mixkit-casino-chips-stacking-2012.mp3"></audio>

    <script src="script.js"></script>
</body>

</html>
